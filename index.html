<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 프롬프트 저장소</title>
  <link href='/style.css' rel='stylesheet'>
  <!-- Phosphor Icons for modern iconography -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <i class="ph-fill ph-magic-wand"></i>
        <span>PromptHub</span>
      </div>
      <button id="theme-toggle" class="icon-button" aria-label="테마 변경">
        <i class="ph ph-moon"></i>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>일 잘하는 사람들의<br><span class="highlight">AI 프롬프트</span> 모음</h1>
      <p>직무별 핵심 프롬프트를 복사하여 바로 업무에 적용해보세요.</p>
      
      <div class="search-container">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="원하는 프롬프트를 검색해보세요 (예: SEO, 코드 리뷰)">
      </div>
    </section>

    <section class="controls">
      <div class="filter-group" id="filter-container">
        <button class="filter-btn active" data-role="all">전체</button>
        <button class="filter-btn" data-role="marketer">마케터</button>
        <button class="filter-btn" data-role="developer">개발자</button>
        <button class="filter-btn" data-role="designer">디자이너</button>
        <button class="filter-btn" data-role="planner">기획자</button>
      </div>
    </section>

    <section class="prompt-grid" id="prompt-grid">
      <!-- Cards will be injected here by JS -->
    </section>
  </main>

  <div id="toast" class="toast">복사되었습니다!</div>

  <script type="module" src="/main.js"></script>
</body>
</html>
